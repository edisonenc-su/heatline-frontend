<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1b2a">
  <title>고객사 / 사용자 관리 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <div id="admin-stats"></div>

        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
          <div class="search-box" style="min-width:260px;">
            <span>🔎</span>
            <input type="text" id="search-input" placeholder="고객사명, 사용자명, 아이디 검색..." oninput="renderAll()">
          </div>
          <select id="filter-user-role" onchange="renderUsersTable()" class="form-select compact-select">
            <option value="">전체 권한</option>
            <option value="admin">관리자</option>
            <option value="customer">고객</option>
          </select>
          <select id="filter-user-state" onchange="renderUsersTable()" class="form-select compact-select">
            <option value="">전체 상태</option>
            <option value="active">활성</option>
            <option value="inactive">비활성</option>
            <option value="unassigned">미할당</option>
          </select>
          <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 새로고침</button>
            <button class="btn btn-primary btn-sm" onclick="openCustomerModal()">🏢 고객사 등록</button>
            <button class="btn btn-primary btn-sm" onclick="openUserModal()">👤 사용자 등록</button>
          </div>
        </div>

        <div class="table-section" style="margin-bottom:24px;">
          <div class="table-header">
            <h2>🏢 고객사 관리</h2>
            <div id="customer-count" style="font-size:13px;color:#94a3b8"></div>
          </div>
          <div id="customer-grid" class="customer-grid">
            <div style="padding:48px;text-align:center;color:#64748b;grid-column:1/-1;">로딩 중...</div>
          </div>
        </div>

        <div class="table-section">
          <div class="table-header">
            <h2>👤 사용자 계정 관리</h2>
            <div id="user-count" style="font-size:13px;color:#94a3b8"></div>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>아이디</th>
                  <th>이름</th>
                  <th>권한</th>
                  <th>소속 고객사</th>
                  <th>상태</th>
                  <th>생성일</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="7" style="text-align:center;padding:30px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal-box" style="max-width:460px;">
      <div class="modal-header">
        <div class="modal-title confirm-title">확인</div>
        <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
      </div>
      <div class="modal-body confirm-modal" style="text-align:center;padding:26px 24px;">
        <div style="font-size:42px;margin-bottom:10px;">⚠️</div>
        <div class="confirm-msg" style="color:#cbd5e1;line-height:1.6;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">취소</button>
        <button class="btn btn-danger" id="confirm-ok-btn">확인</button>
      </div>
    </div>
  </div>

  <div id="customer-modal" class="modal-backdrop">
    <div class="modal-box" style="max-width:760px;">
      <div class="modal-header">
        <div class="modal-title" id="customer-modal-title">고객사 등록</div>
        <button class="modal-close" onclick="closeModal('customer-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid-two">
          <div>
            <label class="form-label">고객사명 *</label>
            <input id="form-company-name" class="form-input" type="text" placeholder="예: 강원도로청">
          </div>
          <div>
            <label class="form-label">담당자명</label>
            <input id="form-contact-name" class="form-input" type="text" placeholder="예: 홍길동">
          </div>
          <div>
            <label class="form-label">연락처</label>
            <input id="form-contact-phone" class="form-input" type="text" placeholder="예: 010-1234-5678">
          </div>
          <div>
            <label class="form-label">이메일</label>
            <input id="form-contact-email" class="form-input" type="email" placeholder="예: manager@example.com">
          </div>
          <div style="grid-column:1 / -1;">
            <label class="form-label">주소</label>
            <input id="form-address" class="form-input" type="text" placeholder="예: 강원특별자치도 춘천시 ...">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <input id="form-customer-active" type="checkbox" checked>
            <label for="form-customer-active">활성 상태</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('customer-modal')">취소</button>
        <button class="btn btn-primary" id="customer-save-btn" onclick="saveCustomer()">저장</button>
      </div>
    </div>
  </div>

  <div id="user-modal" class="modal-backdrop">
    <div class="modal-box" style="max-width:780px;">
      <div class="modal-header">
        <div class="modal-title" id="user-modal-title">사용자 등록</div>
        <button class="modal-close" onclick="closeModal('user-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid-two">
          <div>
            <label class="form-label">로그인 아이디 *</label>
            <input id="form-username" class="form-input" type="text" placeholder="예: gangwon_admin">
          </div>
          <div>
            <label class="form-label">이름</label>
            <input id="form-full-name" class="form-input" type="text" placeholder="예: 강원 관리자">
          </div>
          <div>
            <label class="form-label">초기 비밀번호 <span id="password-help" style="font-weight:400;color:#94a3b8">*</span></label>
            <input id="form-password" class="form-input" type="password" placeholder="등록 시 필수, 수정 시 비우면 유지">
          </div>
          <div>
            <label class="form-label">권한 *</label>
            <select id="form-role" class="form-select" onchange="handleRoleChange()">
              <option value="customer">고객 사용자</option>
              <option value="admin">관리자</option>
            </select>
          </div>
          <div id="customer-select-wrap" style="grid-column:1 / -1;">
            <label class="form-label">소속 고객사 *</label>
            <select id="form-user-customer-id" class="form-select"></select>
            <div style="font-size:12px;color:#94a3b8;margin-top:6px;">고객 사용자일 때 필수입니다. 관리자 계정은 고객사 소속 없이 운영 가능합니다.</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <input id="form-user-active" type="checkbox" checked>
            <label for="form-user-active">활성 상태</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('user-modal')">취소</button>
        <button class="btn btn-primary" id="user-save-btn" onclick="saveUser()">저장</button>
      </div>
    </div>
  </div>

  <style>
    .customer-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(330px, 1fr));
      gap:18px;
    }
    .customer-card {
      background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(15,23,42,.62));
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      box-shadow:0 14px 30px rgba(2,6,23,.18);
    }
    .customer-stats {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      margin:14px 0 16px;
    }
    .customer-stat {
      background:var(--bg-dark);
      border:1px solid rgba(148,163,184,.12);
      border-radius:12px;
      padding:12px 8px;
      text-align:center;
    }
    .customer-stat .num { font-size:20px; font-weight:800; }
    .customer-stat .label { font-size:11px; color:#94a3b8; margin-top:3px; }
    .form-label { display:block; font-size:13px; color:#94a3b8; margin-bottom:6px; font-weight:600; }
    .form-input, .form-select {
      width:100%; background:var(--bg-dark); border:1px solid var(--border); color:var(--text-primary);
      border-radius:10px; padding:11px 12px; outline:none; font-size:14px;
    }
    .compact-select { min-width:170px; }
    .form-grid-two {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
    }
    .action-row { display:flex; gap:8px; flex-wrap:wrap; }
    @media (max-width: 900px) {
      .form-grid-two { grid-template-columns:1fr; }
      .customer-stats { grid-template-columns:repeat(2, 1fr); }
    }
  </style>

  <script src="js/app.js?v=20260407-2"></script>
  <script>
    let session = null;
    let allCustomers = [];
    let allControllers = [];
    let allUsers = [];
    let editingCustomerId = null;
    let editingUserId = null;

    function $(id) { return document.getElementById(id); }

    function openModal(id) {
      const el = $(id);
      if (el) el.style.display = 'flex';
    }

    function showConfirm(message, onConfirm, title = '확인') {
      document.querySelector('#confirm-modal .confirm-title').textContent = title;
      document.querySelector('#confirm-modal .confirm-msg').textContent = message;
      $('confirm-ok-btn').onclick = () => {
        closeModal('confirm-modal');
        onConfirm();
      };
      openModal('confirm-modal');
    }

    function getCustomerMap() {
      const map = {};
      allCustomers.forEach(item => { map[String(item.id)] = item; });
      return map;
    }

    function applySearch(items, mapper) {
      const q = $('search-input').value.trim().toLowerCase();
      if (!q) return items;
      return items.filter(item => mapper(item).toLowerCase().includes(q));
    }

    function renderStats() {
      const unassignedUsers = allUsers.filter(u => u.role === 'customer' && !u.customer_id).length;
      const stats = {
        totalCustomers: allCustomers.length,
        activeCustomers: allCustomers.filter(c => c.is_active).length,
        totalUsers: allUsers.length,
        activeUsers: allUsers.filter(u => u.is_active).length,
        unassignedUsers
      };
      $('admin-stats').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;">
          <div class="stat-card total"><div class="stat-icon">🏢</div><div class="stat-value">${stats.totalCustomers}</div><div class="stat-label">전체 고객사</div></div>
          <div class="stat-card online"><div class="stat-icon">✅</div><div class="stat-value">${stats.activeCustomers}</div><div class="stat-label">활성 고객사</div></div>
          <div class="stat-card info"><div class="stat-icon">👤</div><div class="stat-value">${stats.totalUsers}</div><div class="stat-label">전체 사용자</div></div>
          <div class="stat-card online"><div class="stat-icon">🔐</div><div class="stat-value">${stats.activeUsers}</div><div class="stat-label">활성 계정</div></div>
          <div class="stat-card warning"><div class="stat-icon">📌</div><div class="stat-value">${stats.unassignedUsers}</div><div class="stat-label">미할당 고객계정</div></div>
        </div>`;
    }

    function renderCustomerCards() {
      const grid = $('customer-grid');
      const searched = applySearch(allCustomers, c => [c.company_name, c.contact_name, c.contact_phone, c.contact_email, c.address].join(' '));
      $('customer-count').textContent = `총 ${searched.length}개 표시`;

      if (!searched.length) {
        grid.innerHTML = `<div style="padding:48px;text-align:center;color:#64748b;grid-column:1/-1;">표시할 고객사가 없습니다.</div>`;
        return;
      }

      grid.innerHTML = searched.map(cust => {
        const controllers = allControllers.filter(c => String(c.customer_id) === String(cust.id));
        const users = allUsers.filter(u => String(u.customer_id || '') === String(cust.id));
        const online = controllers.filter(c => c.status === 'online').length;
        const asUrgent = controllers.filter(c => {
          const d = Utils.calcAsRemaining(c.as_expire_at);
          return d !== null && d <= 30;
        }).length;
        return `
          <div class="customer-card">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
              <div>
                <div style="font-size:19px;font-weight:800;margin-bottom:4px;">${cust.company_name}</div>
                <div style="font-size:13px;color:#94a3b8;line-height:1.5;">담당자 ${cust.contact_name || '-'} · 연락처 ${cust.contact_phone || '-'}</div>
              </div>
              <span class="badge ${cust.is_active ? 'badge-online' : 'badge-offline'}">${cust.is_active ? '활성' : '비활성'}</span>
            </div>
            <div style="font-size:12px;color:#94a3b8;margin-top:10px;line-height:1.6;">
              <div>📧 ${cust.contact_email || '-'}</div>
              <div>📍 ${cust.address || '-'}</div>
            </div>
            <div class="customer-stats">
              <div class="customer-stat"><div class="num">${controllers.length}</div><div class="label">장비</div></div>
              <div class="customer-stat"><div class="num" style="color:#10b981">${online}</div><div class="label">온라인</div></div>
              <div class="customer-stat"><div class="num">${users.length}</div><div class="label">사용자</div></div>
              <div class="customer-stat"><div class="num" style="color:${asUrgent > 0 ? '#ef4444' : '#10b981'}">${asUrgent}</div><div class="label">AS임박</div></div>
            </div>
            <div class="action-row">
              <button class="btn btn-secondary btn-sm" onclick="openCustomerModal('${cust.id}')">✏️ 수정</button>
              <button class="btn btn-secondary btn-sm" onclick="openUserModal(null, '${cust.id}')">👤 계정추가</button>
              <button class="btn btn-secondary btn-sm" onclick="location.href='controllers.html?customer=${cust.id}'">🖥️ 장비보기</button>
              <button class="btn btn-danger btn-sm" onclick="removeCustomer('${cust.id}')">🗑️ 삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderUsersTable() {
      const tbody = $('users-tbody');
      const custMap = getCustomerMap();
      const roleFilter = $('filter-user-role').value;
      const stateFilter = $('filter-user-state').value;

      let items = applySearch(allUsers, u => [u.username, u.full_name, custMap[String(u.customer_id)]?.company_name || ''].join(' '));
      if (roleFilter) items = items.filter(u => u.role === roleFilter);
      if (stateFilter === 'active') items = items.filter(u => u.is_active);
      if (stateFilter === 'inactive') items = items.filter(u => !u.is_active);
      if (stateFilter === 'unassigned') items = items.filter(u => u.role === 'customer' && !u.customer_id);

      $('user-count').textContent = `총 ${items.length}명 표시`;

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:#64748b">표시할 사용자가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = items.map(u => {
        const customer = custMap[String(u.customer_id)];
        const customerLabel = u.role === 'admin' ? '시스템 관리자' : (customer ? customer.company_name : '미할당');
        return `
          <tr>
            <td><div style="font-family:monospace;font-weight:700;">${u.username}</div></td>
            <td>${u.full_name || '-'}</td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-danger' : 'badge-info'}">${u.role === 'admin' ? '관리자' : '고객'}</span></td>
            <td>${customerLabel}</td>
            <td><span class="badge ${u.is_active ? 'badge-online' : 'badge-offline'}">${u.is_active ? '활성' : '비활성'}</span></td>
            <td style="font-size:12px;color:#94a3b8;">${Utils.formatDateTime(u.created_at)}</td>
            <td><button class="btn btn-secondary btn-sm" onclick="openUserModal('${u.id}')">수정</button></td>
          </tr>`;
      }).join('');
    }

    function renderAll() {
      renderStats();
      renderCustomerCards();
      renderUsersTable();
    }

    function fillCustomerSelect(selectedId = '') {
      const select = $('form-user-customer-id');
      select.innerHTML = '<option value="">고객사를 선택하세요</option>';
      allCustomers.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.company_name}</option>`;
      });
      select.value = selectedId ? String(selectedId) : '';
    }

    function openCustomerModal(customerId = null) {
      editingCustomerId = customerId;
      const item = customerId ? allCustomers.find(c => String(c.id) === String(customerId)) : null;
      $('customer-modal-title').textContent = item ? '고객사 수정' : '고객사 등록';
      $('customer-save-btn').textContent = item ? '수정 저장' : '등록';
      $('form-company-name').value = item?.company_name || '';
      $('form-contact-name').value = item?.contact_name || '';
      $('form-contact-phone').value = item?.contact_phone || '';
      $('form-contact-email').value = item?.contact_email || '';
      $('form-address').value = item?.address || '';
      $('form-customer-active').checked = item?.is_active !== false;
      openModal('customer-modal');
    }

    async function saveCustomer() {
      const btn = $('customer-save-btn');
      const prev = btn.textContent;
      btn.disabled = true;
      btn.textContent = '저장 중...';
      try {
        const payload = {
          company_name: $('form-company-name').value.trim(),
          contact_name: $('form-contact-name').value.trim() || null,
          contact_phone: $('form-contact-phone').value.trim() || null,
          contact_email: $('form-contact-email').value.trim() || null,
          address: $('form-address').value.trim() || null,
          is_active: $('form-customer-active').checked
        };
        if (!payload.company_name) throw new Error('고객사명은 필수입니다.');
        if (editingCustomerId) {
          await API.updateCustomer(editingCustomerId, payload);
          Utils.toast('수정 완료', '고객사 정보가 수정되었습니다.', 'success');
        } else {
          await API.createCustomer(payload);
          Utils.toast('등록 완료', '고객사가 등록되었습니다.', 'success');
        }
        closeModal('customer-modal');
        await loadAll();
      } catch (error) {
        Utils.toast('저장 실패', error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    }

    function removeCustomer(customerId) {
      const item = allCustomers.find(c => String(c.id) === String(customerId));
      if (!item) return;
      showConfirm(
        `${item.company_name} 고객사를 삭제할까요?\n장비가 남아 있으면 삭제되지 않습니다.\n연결된 사용자 계정은 자동으로 고객사 연결이 해제됩니다.`,
        async () => {
          try {
            const result = await API.deleteCustomer(customerId);
            const detached = result?.detached_user_count || 0;
            Utils.toast('삭제 완료', detached > 0 ? `고객사 삭제 + 사용자 ${detached}명 자동 해제` : '고객사를 삭제했습니다.', 'success');
            await loadAll();
          } catch (error) {
            Utils.toast('삭제 실패', error.message, 'error');
          }
        },
        '고객사 삭제'
      );
    }

    function handleRoleChange() {
      const role = $('form-role').value;
      const wrap = $('customer-select-wrap');
      const select = $('form-user-customer-id');
      if (role === 'admin') {
        wrap.style.opacity = '0.65';
        select.value = '';
        select.disabled = true;
      } else {
        wrap.style.opacity = '1';
        select.disabled = false;
      }
    }

    function openUserModal(userId = null, presetCustomerId = null) {
      editingUserId = userId;
      const user = userId ? allUsers.find(u => String(u.id) === String(userId)) : null;
      $('user-modal-title').textContent = user ? '사용자 수정' : '사용자 등록';
      $('user-save-btn').textContent = user ? '수정 저장' : '등록';
      $('form-username').disabled = !!user;
      $('form-username').value = user?.username || '';
      $('form-full-name').value = user?.full_name || '';
      $('form-password').value = '';
      $('form-role').value = user?.role || 'customer';
      fillCustomerSelect(user?.customer_id || presetCustomerId || '');
      $('form-user-active').checked = user?.is_active !== false;
      $('password-help').textContent = user ? '(비우면 기존 비밀번호 유지)' : '*';
      handleRoleChange();
      openModal('user-modal');
    }

    async function saveUser() {
      const btn = $('user-save-btn');
      const prev = btn.textContent;
      btn.disabled = true;
      btn.textContent = '저장 중...';
      try {
        const role = $('form-role').value;
        const payload = {
          full_name: $('form-full-name').value.trim() || null,
          role,
          customer_id: role === 'customer' ? (Number($('form-user-customer-id').value) || null) : null,
          is_active: $('form-user-active').checked
        };
        const username = $('form-username').value.trim();
        const password = $('form-password').value.trim();

        if (!editingUserId) {
          if (!username || !password) throw new Error('아이디와 초기 비밀번호는 필수입니다.');
          payload.username = username;
          payload.password = password;
          if (role === 'customer' && !payload.customer_id) throw new Error('고객 사용자에는 소속 고객사가 필요합니다.');
          await API.createUser(payload);
          Utils.toast('등록 완료', '사용자 계정이 생성되었습니다.', 'success');
        } else {
          if (password) payload.password = password;
          if (role === 'customer' && !payload.customer_id) throw new Error('고객 사용자에는 소속 고객사가 필요합니다.');
          await API.updateUser(editingUserId, payload);
          Utils.toast('수정 완료', '사용자 정보가 수정되었습니다.', 'success');
        }
        closeModal('user-modal');
        await loadAll();
      } catch (error) {
        Utils.toast('저장 실패', error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    }

    async function loadAll() {
      try {
        [allCustomers, allControllers, allUsers] = await Promise.all([
          API.getAll(APP_TABLES.CUSTOMERS),
          API.getAll(APP_TABLES.CONTROLLERS),
          API.getAll(APP_TABLES.USERS)
        ]);
        renderAll();
      } catch (error) {
        Utils.toast('로딩 실패', error.message, 'error');
      }
    }

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;
      if (session.role !== 'admin') {
        location.href = 'dashboard.html';
        return;
      }
      $('sidebar-placeholder').innerHTML = renderSidebar(session, 'customers');
      $('header-placeholder').innerHTML = renderHeader('고객사 / 사용자 관리', '고객사는 관리자가 등록하고, 사용자 아이디/비밀번호/권한도 관리자 계정에서 직접 배정합니다.');
      startClock();
      await loadAll();
    }

    init();
  </script>
</body>
</html>
