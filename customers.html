<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객사 관리 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">

        <!-- 고객사 카드 목록 -->
        <div id="customer-grid" style="
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
          gap: 20px;
          margin-bottom: 24px;
        ">
          <div style="padding:40px;text-align:center;color:#64748b;grid-column:1/-1">로딩 중...</div>
        </div>

        <!-- 사용자 계정 목록 (관리자 전용) -->
        <div class="table-section" id="users-section">
          <div class="table-header">
            <h2>👤 사용자 계정</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 새로고침</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>아이디</th>
                  <th>이름</th>
                  <th>역할</th>
                  <th>소속 고객사</th>
                  <th>상태</th>
                  <th>최근 생성</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="6" style="text-align:center;padding:30px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title confirm-title">확인</div>
        <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
      </div>
      <div class="modal-body confirm-modal" style="text-align:center;padding:30px">
        <span class="icon" style="font-size:48px;display:block;margin-bottom:12px">❓</span>
        <p class="confirm-msg" style="color:#94a3b8"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">취소</button>
        <button class="btn btn-danger" id="confirm-ok-btn">확인</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let session;
    let allCustomers = [], allControllers = [], allUsers = [];

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;

      // 관리자 전용 페이지
      if (session.role !== 'admin') {
        location.href = 'dashboard.html';
        return;
      }

      document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'customers');
      document.getElementById('header-placeholder').innerHTML = renderHeader('고객사 관리', '', []);
      startClock();

      await loadAll();
    }

    async function loadAll() {
      [allCustomers, allControllers, allUsers] = await Promise.all([
        API.getAll(APP.TABLES.CUSTOMERS),
        API.getAll(APP.TABLES.CONTROLLERS),
        API.getAll(APP.TABLES.USERS)
      ]);

      renderCustomerCards();
      renderUsersTable();
    }

    function renderCustomerCards() {
      const grid = document.getElementById('customer-grid');

      if (allCustomers.length === 0) {
        grid.innerHTML = `<div style="text-align:center;padding:60px;color:#64748b;grid-column:1/-1">등록된 고객사 없음</div>`;
        return;
      }

      grid.innerHTML = allCustomers.map(cust => {
        const myCtrl = allControllers.filter(c => c.customer_id === cust.id);
        const online = myCtrl.filter(c => c.status === 'online').length;
        const offline = myCtrl.filter(c => c.status === 'offline').length;
        const asUrgent = myCtrl.filter(c => {
          const d = Utils.calcAsRemaining(c.as_expire_at);
          return d !== null && d <= 30;
        }).length;

        const stats = Utils.calcStats(myCtrl);

        return `
          <div class="stat-card total" style="cursor:default">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
              <div>
                <div style="font-size:18px;font-weight:800;margin-bottom:4px">${cust.company_name}</div>
                <div style="font-size:13px;color:#94a3b8">
                  👤 ${cust.contact_name || '-'} &nbsp;|&nbsp; 📞 ${cust.contact_phone || '-'}
                </div>
              </div>
              <span class="badge ${cust.is_active ? 'badge-online' : 'badge-offline'}">
                ${cust.is_active ? '활성' : '비활성'}
              </span>
            </div>

            <div style="font-size:12px;color:#64748b;margin-bottom:16px">
              📧 ${cust.contact_email || '-'}
            </div>

            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
              <div style="text-align:center;background:var(--bg-dark);padding:10px 6px;border-radius:8px">
                <div style="font-size:20px;font-weight:800">${myCtrl.length}</div>
                <div style="font-size:11px;color:#64748b">전체</div>
              </div>
              <div style="text-align:center;background:var(--bg-dark);padding:10px 6px;border-radius:8px">
                <div style="font-size:20px;font-weight:800;color:#10b981">${online}</div>
                <div style="font-size:11px;color:#64748b">온라인</div>
              </div>
              <div style="text-align:center;background:var(--bg-dark);padding:10px 6px;border-radius:8px">
                <div style="font-size:20px;font-weight:800;color:#64748b">${offline}</div>
                <div style="font-size:11px;color:#64748b">오프라인</div>
              </div>
              <div style="text-align:center;background:var(--bg-dark);padding:10px 6px;border-radius:8px">
                <div style="font-size:20px;font-weight:800;color:${asUrgent > 0 ? '#ef4444' : '#10b981'}">${asUrgent}</div>
                <div style="font-size:11px;color:#64748b">AS임박</div>
              </div>
            </div>

            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="viewCustomerControllers('${cust.id}')">
                📋 장비 보기
              </button>
              ${asUrgent > 0 ? `
                <span class="badge badge-danger">🚨 AS 만료 임박 ${asUrgent}건</span>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderUsersTable() {
      const tbody = document.getElementById('users-tbody');
      const custMap = {};
      allCustomers.forEach(c => custMap[c.id] = c);

      if (allUsers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px;color:#64748b">사용자 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = allUsers.map(u => {
        const cust = custMap[u.customer_id];
        return `
          <tr>
            <td>
              <div style="font-weight:600;font-family:monospace">${u.username}</div>
            </td>
            <td>${u.full_name || '-'}</td>
            <td>
              <span class="badge ${u.role === 'admin' ? 'badge-danger' : 'badge-info'}">
                ${u.role === 'admin' ? '👑 관리자' : '👤 고객'}
              </span>
            </td>
            <td style="font-size:13px">${cust ? cust.company_name : u.role === 'admin' ? '시스템' : '-'}</td>
            <td>
              <span class="badge ${u.is_active ? 'badge-online' : 'badge-offline'}">
                ${u.is_active ? '활성' : '비활성'}
              </span>
            </td>
            <td style="font-size:12px;color:#64748b">${Utils.timeAgo(u.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    function viewCustomerControllers(customerId) {
      // 고객사 ID 필터로 장비 목록 이동
      location.href = 'controllers.html?customer=' + customerId;
    }

    init();
  </script>
</body>
</html>
