<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장비 목록 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <!-- 통계 카드 -->
        <div id="stats-container"></div>

        <!-- 필터 바 -->
        <div style="
          background:var(--bg-card);
          border:1px solid var(--border);
          border-radius:var(--radius);
          padding:16px 20px;
          margin-bottom:20px;
          display:flex;
          gap:12px;
          flex-wrap:wrap;
          align-items:center;
        ">
          <div class="search-box" style="min-width:240px">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="제어기명, 주소, 시리얼 검색..." oninput="filterTable()">
          </div>

          <select id="filter-status" onchange="filterTable()" style="
            background:var(--bg-dark);
            border:1px solid var(--border);
            border-radius:8px;
            padding:9px 14px;
            color:var(--text-primary);
            font-size:14px;
            outline:none;cursor:pointer;
          ">
            <option value="">전체 상태</option>
            <option value="online">🟢 온라인</option>
            <option value="offline">⚫ 오프라인</option>
            <option value="warning">🟡 경고</option>
            <option value="error">🔴 오류</option>
          </select>

          <select id="filter-heater" onchange="filterTable()" style="
            background:var(--bg-dark);
            border:1px solid var(--border);
            border-radius:8px;
            padding:9px 14px;
            color:var(--text-primary);
            font-size:14px;
            outline:none;cursor:pointer;
          ">
            <option value="">히터 전체</option>
            <option value="on">🔥 히터 ON</option>
            <option value="off">❄️ 히터 OFF</option>
          </select>

          <select id="filter-as" onchange="filterTable()" style="
            background:var(--bg-dark);
            border:1px solid var(--border);
            border-radius:8px;
            padding:9px 14px;
            color:var(--text-primary);
            font-size:14px;
            outline:none;cursor:pointer;
          ">
            <option value="">AS 전체</option>
            <option value="urgent">🚨 만료 임박 (30일 이내)</option>
            <option value="caution">⚠️ 주의 (90일 이내)</option>
            <option value="good">✅ 정상</option>
          </select>

          <div id="admin-filter-wrap" style="display:none">
            <select id="filter-customer" onchange="filterTable()" style="
              background:var(--bg-dark);
              border:1px solid var(--border);
              border-radius:8px;
              padding:9px 14px;
              color:var(--text-primary);
              font-size:14px;
              outline:none;cursor:pointer;
            ">
              <option value="">전체 고객사</option>
            </select>
          </div>

          <div style="margin-left:auto;display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="resetFilters()">필터 초기화</button>
            <span id="result-count" style="
              display:flex;align-items:center;
              font-size:13px;color:#94a3b8;
              padding:0 4px;
            "></span>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-section">
          <div class="table-header">
            <h2>📋 <span id="list-title">장비 목록</span></h2>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary btn-sm" onclick="loadData()">🔄 새로고침</button>
              <div id="admin-add-btn" style="display:none">
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">➕ 장비 등록</button>
              </div>
            </div>
          </div>

          <div class="table-responsive">
            <table id="controllers-table">
              <thead>
                <tr>
                  <th>제어기명 / 시리얼</th>
                  <th id="th-customer" style="display:none">고객사</th>
                  <th>설치 위치</th>
                  <th>상태</th>
                  <th>눈 감지</th>
                  <th>히터</th>
                  <th>온도</th>
                  <th>잔여 AS</th>
                  <th>마지막 통신</th>
                </tr>
              </thead>
              <tbody id="controllers-tbody">
                <tr><td colspan="9" style="text-align:center;padding:40px;color:#64748b">
                  <div class="loading-spinner" style="margin:0 auto 10px"></div><br>로딩 중...
                </td></tr>
              </tbody>
            </table>
          </div>

          <div id="empty-state" class="hidden" style="padding:60px 20px;text-align:center;color:#64748b">
            <div style="font-size:48px;margin-bottom:12px">📭</div>
            <div style="font-size:16px;font-weight:600;margin-bottom:8px">장비가 없습니다</div>
            <div style="font-size:14px">검색 조건을 변경해보세요.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 확인 모달 -->
  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title confirm-title">확인</div>
        <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
      </div>
      <div class="modal-body confirm-modal">
        <span class="icon">❓</span>
        <p class="confirm-msg"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">취소</button>
        <button class="btn btn-danger" id="confirm-ok-btn">확인</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let session = null;
    let allControllers = [];
    let allCustomers = [];
    let filtered = [];

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;

      document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'controllers');

      if (session.role === 'admin') {
        document.getElementById('list-title').textContent = '전체 장비 목록';
        document.getElementById('th-customer').style.display = '';
        document.getElementById('admin-filter-wrap').style.display = '';
        document.getElementById('admin-add-btn').style.display = '';
      }

      await loadData();

      const stats = Utils.calcStats(allControllers);
      document.getElementById('header-placeholder').innerHTML = renderHeader(
        session.role === 'admin' ? '장비 목록' : '내 장비 목록',
        `총 ${allControllers.length}대`,
        [
          { type: 'online', label: '온라인', value: stats.online },
          { type: 'warning', label: '경고', value: stats.warning },
          { type: 'danger', label: 'AS임박', value: stats.asUrgent }
        ]
      );

      document.getElementById('stats-container').innerHTML = renderStatsCards(stats, session);

      startClock();

      // URL 쿼리파라미터에서 고객사 필터 읽기
      const params = new URLSearchParams(window.location.search);
      const customerParam = params.get('customer');
      if (customerParam && session.role === 'admin') {
        setTimeout(() => {
          const sel = document.getElementById('filter-customer');
          if (sel) { sel.value = customerParam; filterTable(); }
        }, 100);
      }

      renderTable();
    }

    async function loadData() {
      [allControllers, allCustomers] = await Promise.all([
        API.getControllers(session),
        API.getCustomers()
      ]);

      // 고객사 필터 옵션 채우기
      if (session.role === 'admin') {
        const sel = document.getElementById('filter-customer');
        sel.innerHTML = '<option value="">전체 고객사</option>';
        allCustomers.forEach(c => {
          sel.innerHTML += `<option value="${c.id}">${c.company_name}</option>`;
        });
      }

      filterTable();
    }

    function filterTable() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const heater = document.getElementById('filter-heater').value;
      const asFilter = document.getElementById('filter-as').value;
      const customer = session.role === 'admin'
        ? document.getElementById('filter-customer').value : null;

      filtered = allControllers.filter(ctrl => {
        if (status && ctrl.status !== status) return false;
        if (heater === 'on' && !ctrl.heater_on) return false;
        if (heater === 'off' && ctrl.heater_on) return false;
        if (customer && ctrl.customer_id !== customer) return false;

        if (asFilter) {
          const days = Utils.calcAsRemaining(ctrl.as_expire_at);
          const asStatus = Utils.getAsStatus(days);
          if (asFilter === 'urgent' && asStatus !== 'urgent' && asStatus !== 'expired') return false;
          if (asFilter === 'caution' && asStatus !== 'caution') return false;
          if (asFilter === 'good' && asStatus !== 'good') return false;
        }

        if (search) {
          const haystack = [
            ctrl.controller_name,
            ctrl.install_address,
            ctrl.install_location,
            ctrl.serial_no
          ].join(' ').toLowerCase();
          if (!haystack.includes(search)) return false;
        }

        return true;
      });

      renderTable();
    }

    function resetFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('filter-status').value = '';
      document.getElementById('filter-heater').value = '';
      document.getElementById('filter-as').value = '';
      if (session.role === 'admin') document.getElementById('filter-customer').value = '';
      filterTable();
    }

    function renderTable() {
      const tbody = document.getElementById('controllers-tbody');
      const emptyState = document.getElementById('empty-state');
      const resultCount = document.getElementById('result-count');
      const isAdmin = session.role === 'admin';

      resultCount.textContent = `${filtered.length}개 장비`;

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      tbody.innerHTML = filtered.map(ctrl => renderControllerRow(ctrl, allCustomers, isAdmin)).join('');
    }

    function openAddModal() {
      Utils.toast('준비 중', '장비 등록 기능은 준비 중입니다.', 'info');
    }

    init();
  </script>
</body>
</html>
