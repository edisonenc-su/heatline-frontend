<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>로그인 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <title>이벤트 로그 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <!-- 심각도별 통계 -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px" id="evt-stats"></div>

        <!-- 필터 -->
        <div style="
          background:var(--bg-card);border:1px solid var(--border);
          border-radius:var(--radius);padding:16px 20px;
          margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;
        ">
          <select id="filter-severity" onchange="renderTable()" style="
            background:var(--bg-dark);border:1px solid var(--border);
            border-radius:8px;padding:9px 14px;color:var(--text-primary);
            font-size:14px;outline:none;cursor:pointer;
          ">
            <option value="">전체 심각도</option>
            <option value="critical">🚨 긴급</option>
            <option value="warning">⚠️ 경고</option>
            <option value="info">ℹ️ 정보</option>
          </select>

          <select id="filter-type" onchange="renderTable()" style="
            background:var(--bg-dark);border:1px solid var(--border);
            border-radius:8px;padding:9px 14px;color:var(--text-primary);
            font-size:14px;outline:none;cursor:pointer;
          ">
            <option value="">전체 유형</option>
            <option value="SNOW_DETECTED">❄️ 눈 감지</option>
            <option value="SNOW_CLEARED">☀️ 눈 해제</option>
            <option value="HEATER_ON">🔥 히터 ON</option>
            <option value="HEATER_OFF">💧 히터 OFF</option>
            <option value="DEVICE_OFFLINE">⚫ 장비 오프라인</option>
            <option value="DEVICE_ONLINE">🟢 장비 온라인</option>
            <option value="ALARM">🚨 알람</option>
          </select>

          <button class="btn btn-secondary btn-sm" onclick="resetFilters()">초기화</button>
          <span id="result-count" style="font-size:13px;color:#94a3b8;margin-left:auto"></span>
        </div>

        <!-- 이벤트 테이블 -->
        <div class="table-section">
          <div class="table-header">
            <h2>🔔 이벤트 로그 전체</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 새로고침</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>심각도</th>
                  <th>유형</th>
                  <th>제어기명</th>
                  <th id="th-customer">고객사</th>
                  <th>메시지</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody id="evt-tbody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    let session, allEvents = [], allControllers = [], allCustomers = [];

    const evtIcons = {
      SNOW_DETECTED: '❄️', SNOW_CLEARED: '☀️',
      HEATER_ON: '🔥', HEATER_OFF: '💧',
      DEVICE_OFFLINE: '⚫', DEVICE_ONLINE: '🟢', ALARM: '🚨'
    };
    const severityColor = { info: '#10b981', warning: '#f59e0b', critical: '#ef4444' };
    const severityLabel = { info: '정보', warning: '경고', critical: '긴급' };

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;

      document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'events');
      document.getElementById('header-placeholder').innerHTML = renderHeader('이벤트 로그', '', []);
      startClock();

      if (session.role !== 'admin') {
        document.getElementById('th-customer').style.display = 'none';
      }

      await loadAll();
    }

    async function loadAll() {
      [allControllers, allCustomers] = await Promise.all([
        API.getControllers(session),
        API.getCustomers()
      ]);

      allEvents = await API.getEventLogs(null, 100);

      // 권한 필터
      const myCtrlIds = new Set(allControllers.map(c => c.id));
      if (session.role !== 'admin') {
        allEvents = allEvents.filter(e => myCtrlIds.has(e.controller_id));
      }

      renderStats();
      renderTable();
    }

    function renderStats() {
      const critical = allEvents.filter(e => e.severity === 'critical').length;
      const warning = allEvents.filter(e => e.severity === 'warning').length;
      const info = allEvents.filter(e => e.severity === 'info').length;

      document.getElementById('evt-stats').innerHTML = `
        <div class="stat-card danger">
          <div class="stat-icon">🚨</div>
          <div class="stat-value">${critical}</div>
          <div class="stat-label">긴급 이벤트</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-icon">⚠️</div>
          <div class="stat-value">${warning}</div>
          <div class="stat-label">경고 이벤트</div>
        </div>
        <div class="stat-card online">
          <div class="stat-icon">ℹ️</div>
          <div class="stat-value">${info}</div>
          <div class="stat-label">정보 이벤트</div>
        </div>
        <div class="stat-card total">
          <div class="stat-icon">📊</div>
          <div class="stat-value">${allEvents.length}</div>
          <div class="stat-label">전체 이벤트</div>
        </div>
      `;
    }

    function renderTable() {
      const severity = document.getElementById('filter-severity').value;
      const type = document.getElementById('filter-type').value;
      const isAdmin = session.role === 'admin';

      const ctrlMap = {}, custMap = {};
      allControllers.forEach(c => ctrlMap[c.id] = c);
      allCustomers.forEach(c => custMap[c.id] = c);

      let filtered = allEvents.filter(e => {
        if (severity && e.severity !== severity) return false;
        if (type && e.event_type !== type) return false;
        return true;
      });

      document.getElementById('result-count').textContent = `${filtered.length}건`;

      const tbody = document.getElementById('evt-tbody');

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdmin ? 6 : 5}" style="text-align:center;padding:30px;color:#64748b">이벤트 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(evt => {
        const ctrl = ctrlMap[evt.controller_id];
        const cust = ctrl ? custMap[ctrl.customer_id] : null;

        return `
          <tr onclick="location.href='detail.html?id=${evt.controller_id}'" style="cursor:pointer">
            <td>
              <span class="badge" style="
                background:${severityColor[evt.severity] || '#94a3b8'}20;
                color:${severityColor[evt.severity] || '#94a3b8'};
                border:1px solid ${severityColor[evt.severity] || '#94a3b8'}40;
              ">
                ${evt.severity === 'critical' ? '🚨 긴급' : evt.severity === 'warning' ? '⚠️ 경고' : 'ℹ️ 정보'}
              </span>
            </td>
            <td>
              <span style="display:inline-flex;align-items:center;gap:5px;font-size:13px">
                ${evtIcons[evt.event_type] || '📌'} ${evt.event_type}
              </span>
            </td>
            <td>
              <div style="font-weight:600;font-size:14px">${ctrl ? ctrl.controller_name : '-'}</div>
            </td>
            ${isAdmin ? `<td style="font-size:13px;color:#94a3b8">${cust ? cust.company_name : '-'}</td>` : ''}
            <td style="font-size:13px">${evt.message || '-'}</td>
            <td style="font-size:12px;color:#64748b;white-space:nowrap">${Utils.timeAgo(evt.updated_at || evt.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    function resetFilters() {
      document.getElementById('filter-severity').value = '';
      document.getElementById('filter-type').value = '';
      renderTable();
    }

    init();
  </script>
</body>
</html>
