<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>로그인 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page { padding:24px 16px; }
    .login-container { width:min(420px, 100%); }
    .demo-account > div { min-width:0; }
    @media (max-width: 768px) {
      .login-page {
        align-items:flex-start;
        padding:24px 16px max(24px, env(safe-area-inset-bottom));
      }
      .login-container {
        padding:32px 20px;
        max-width:100%;
        margin:8px 0 24px;
      }
      .login-logo { margin-bottom:24px; }
      .login-demo { padding:14px; }
      .demo-account {
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
        padding:10px 0;
      }
      .demo-account span[style*="margin-left:8px"] {
        display:block;
        margin-left:0 !important;
        margin-top:4px;
      }
      .demo-role { margin-left:0; }
    }
    @media (max-width: 480px) {
      .login-container { padding:28px 16px; }
      .login-logo h1 { font-size:17px; }
      .road-line { animation-duration:6s; }
    }
    @media (prefers-reduced-motion: reduce) {
      .road-line { animation:none; display:none; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg-animation" id="bgAnimation"></div>

    <div class="login-container">
      <div class="login-logo">
        <span class="logo-icon">🛣️</span>
        <h1>도로 열선 통합관제 시스템</h1>
        <p class="subtitle">Road Heatline Integrated Control System</p>
      </div>

      <div class="login-divider"></div>

      <div id="login-alert" class="alert alert-danger hidden"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">아이디</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          🔐 로그인
        </button>
      </form>

      <div class="login-demo">
        <h4>🧪 데모 계정 (클릭하여 자동 입력)</h4>
        <div class="demo-account" onclick="fillDemo('admin','admin1234')">
          <div>
            <span class="demo-id" style="font-weight:600">admin</span>
            <span style="color:#64748b;margin-left:8px;font-size:12px">/ admin1234</span>
          </div>
          <span class="demo-role admin">관리자</span>
        </div>
        <div class="demo-account" onclick="fillDemo('kangwon','kw1234')">
          <div>
            <span class="demo-id" style="font-weight:600">kangwon</span>
            <span style="color:#64748b;margin-left:8px;font-size:12px">/ kw1234</span>
          </div>
          <span class="demo-role customer">강원지사</span>
        </div>
        <div class="demo-account" onclick="fillDemo('seoul','se1234')">
          <div>
            <span class="demo-id" style="font-weight:600">seoul</span>
            <span style="color:#64748b;margin-left:8px;font-size:12px">/ se1234</span>
          </div>
          <span class="demo-role customer">서울시 도로교통과</span>
        </div>
        <div class="demo-account" onclick="fillDemo('busan','bs1234')">
          <div>
            <span class="demo-id" style="font-weight:600">busan</span>
            <span style="color:#64748b;margin-left:8px;font-size:12px">/ bs1234</span>
          </div>
          <span class="demo-role customer">부산광역시 도로과</span>
        </div>
      </div>

      <div class="login-version">
        v1.0.0 &nbsp;|&nbsp; © 2026 도로 열선 통합관제 시스템
        <br>
        <a href="#" onclick="resetDB()" style="font-size:11px;color:#475569;text-decoration:underline;">
          데모 데이터 초기화
        </a>
      </div>
    </div>
  </div>

  <!-- 토스트 컨테이너 -->
  <div id="toast-container" class="toast-container"></div>
  <script>
  window.HEATLINE_API_BASE_URL = "https://port-0-heatline-backend-mngz3utra2911079.sel3.cloudtype.app/api/v1";
  try {
    const saved = localStorage.getItem("HEATLINE_API_BASE_URL") || "";
    if (!saved || /localhost:8000\/api\/v1/i.test(saved) || /localhost:3000/i.test(saved)) {
      localStorage.setItem("HEATLINE_API_BASE_URL", window.HEATLINE_API_BASE_URL);
    }
  } catch (e) {
    console.warn("HEATLINE_API_BASE_URL 저장 실패:", e);
  }
  </script>
  <script src="js/app.js"></script>
  <script>
    // LocalDB 초기화 (최초 방문 시 시드 데이터 로드)
    LocalDB.init();

    // 이미 로그인된 경우 대시보드로
    if (Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    // 배경 애니메이션
    function createRoadLines() {
      const container = document.getElementById('bgAnimation');
      for (let i = 0; i < 8; i++) {
        const line = document.createElement('div');
        line.className = 'road-line';
        line.style.top = Math.random() * 100 + '%';
        line.style.animationDelay = Math.random() * 4 + 's';
        line.style.animationDuration = (3 + Math.random() * 3) + 's';
        line.style.width = (100 + Math.random() * 200) + 'px';
        container.appendChild(line);
      }
    }
    createRoadLines();

    function fillDemo(id, pw) {
      document.getElementById('username').value = id;
      document.getElementById('password').value = pw;
      document.getElementById('username').focus();
    }

    async function handleLogin(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const alert = document.getElementById('login-alert');

      if (!username || !password) {
        showAlert('아이디와 비밀번호를 입력해주세요.');
        return;
      }

      // 로딩 상태
      btn.disabled = true;
      btn.innerHTML = '<div class="loading-spinner"></div> 로그인 중...';
      alert.classList.add('hidden');

      const result = await Auth.login(username, password);

      if (result.success) {
        btn.innerHTML = '✅ 로그인 성공! 이동 중...';
        Utils.toast('로그인 성공', `${result.session.fullName || username}님, 환영합니다.`, 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        showAlert(result.message);
        btn.disabled = false;
        btn.innerHTML = '🔐 로그인';
      }
    }

    function showAlert(msg) {
      const el = document.getElementById('login-alert');
      el.textContent = '⚠️ ' + msg;
      el.classList.remove('hidden');
    }

    // 엔터키 처리
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.target.closest('form')) {
        document.getElementById('login-form').requestSubmit();
      }
    });

    // 데모 데이터 초기화
    function resetDB() {
      if (confirm('샘플 데이터를 초기화하시겠습니까?\n(제어 이력 등 변경 사항이 삭제됩니다)')) {
        LocalDB.reset();
        Utils.toast('초기화 완료', '샘플 데이터가 초기화되었습니다.', 'success');
      }
    }
  </script>
</body>
</html>
