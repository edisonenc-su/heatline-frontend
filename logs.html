<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제어 이력 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <!-- 제어 이력 -->
        <div class="table-section" style="margin-bottom:24px">
          <div class="table-header">
            <h2>📜 제어 이력</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 새로고침</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>제어기명</th>
                  <th id="th-customer">고객사</th>
                  <th>명령</th>
                  <th>실행자</th>
                  <th>결과</th>
                  <th>비고</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody id="log-tbody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 이벤트 로그 -->
        <div class="table-section">
          <div class="table-header">
            <h2>🔔 이벤트 로그</h2>
            <a href="events.html" class="btn btn-secondary btn-sm">전체 보기</a>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>제어기명</th>
                  <th id="th-evt-customer">고객사</th>
                  <th>이벤트</th>
                  <th>메시지</th>
                  <th>심각도</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody id="evt-tbody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    let session, allControllers = [], allCustomers = [];

    const cmdIcons = {
      HEATER_ON: '🔥', HEATER_OFF: '❄️',
      AUTO_MODE: '⚙️', MANUAL_MODE: '🖱️',
      REBOOT: '🔄', THRESHOLD_CHANGE: '🎯'
    };

    const cmdLabels = {
      HEATER_ON: '히터 ON', HEATER_OFF: '히터 OFF',
      AUTO_MODE: '자동 모드', MANUAL_MODE: '수동 모드',
      REBOOT: '재부팅', THRESHOLD_CHANGE: '임계값 변경'
    };

    const evtIcons = {
      SNOW_DETECTED: '❄️', SNOW_CLEARED: '☀️',
      HEATER_ON: '🔥', HEATER_OFF: '💧',
      DEVICE_OFFLINE: '⚫', DEVICE_ONLINE: '🟢', ALARM: '🚨'
    };

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;

      document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'logs');
      document.getElementById('header-placeholder').innerHTML = renderHeader('제어 이력 / 이벤트 로그', '', []);
      startClock();

      if (session.role !== 'admin') {
        document.getElementById('th-customer').style.display = 'none';
        document.getElementById('th-evt-customer').style.display = 'none';
      }

      await loadAll();
    }

    async function loadAll() {
      [allControllers, allCustomers] = await Promise.all([
        API.getControllers(session),
        API.getCustomers()
      ]);

      const ctrlMap = {};
      allControllers.forEach(c => ctrlMap[c.id] = c);
      const custMap = {};
      allCustomers.forEach(c => custMap[c.id] = c);

      await renderLogs(ctrlMap, custMap);
      await renderEvents(ctrlMap, custMap);
    }

    async function renderLogs(ctrlMap, custMap) {
      const logs = await API.getControlLogs(null, 50);
      const tbody = document.getElementById('log-tbody');
      const isAdmin = session.role === 'admin';

      // 권한 필터
      const filtered = isAdmin
        ? logs
        : logs.filter(l => {
          const c = ctrlMap[l.controller_id];
          return c && c.customer_id === session.customerId;
        });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdmin ? 7 : 6}" style="text-align:center;padding:30px;color:#64748b">이력 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(log => {
        const ctrl = ctrlMap[log.controller_id];
        const cust = ctrl ? custMap[ctrl.customer_id] : null;
        return `
          <tr onclick="location.href='detail.html?id=${log.controller_id}'" style="cursor:pointer">
            <td>
              <div style="font-weight:600">${ctrl ? ctrl.controller_name : log.controller_id}</div>
            </td>
            ${isAdmin ? `<td style="font-size:13px;color:#94a3b8">${cust ? cust.company_name : '-'}</td>` : ''}
            <td>
              <span style="display:inline-flex;align-items:center;gap:5px;font-weight:600">
                ${cmdIcons[log.command_type] || '📌'}
                ${cmdLabels[log.command_type] || log.command_type}
              </span>
              ${log.command_value && log.command_type === 'THRESHOLD_CHANGE'
                ? `<span style="font-size:12px;color:#94a3b8"> → ${(parseFloat(log.command_value)*100).toFixed(0)}%</span>`
                : ''}
            </td>
            <td style="font-size:13px">👤 ${log.user_name || '-'}</td>
            <td>
              <span class="badge ${log.result === 'success' ? 'badge-online' : 'badge-danger'}">
                ${log.result === 'success' ? '✅ 성공' : '❌ 실패'}
              </span>
            </td>
            <td style="font-size:12px;color:#94a3b8">${log.note || '-'}</td>
            <td style="font-size:12px;color:#64748b;white-space:nowrap">${Utils.timeAgo(log.updated_at || log.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    async function renderEvents(ctrlMap, custMap) {
      const events = await API.getEventLogs(null, 30);
      const tbody = document.getElementById('evt-tbody');
      const isAdmin = session.role === 'admin';

      const filtered = isAdmin
        ? events
        : events.filter(e => {
          const c = ctrlMap[e.controller_id];
          return c && c.customer_id === session.customerId;
        });

      const severityColor = { info: '#10b981', warning: '#f59e0b', critical: '#ef4444' };
      const severityLabel = { info: '정보', warning: '경고', critical: '긴급' };

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdmin ? 6 : 5}" style="text-align:center;padding:30px;color:#64748b">이벤트 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(evt => {
        const ctrl = ctrlMap[evt.controller_id];
        const cust = ctrl ? custMap[ctrl.customer_id] : null;
        return `
          <tr onclick="location.href='detail.html?id=${evt.controller_id}'" style="cursor:pointer">
            <td>
              <div style="font-weight:600">${ctrl ? ctrl.controller_name : evt.controller_id}</div>
            </td>
            ${isAdmin ? `<td style="font-size:13px;color:#94a3b8">${cust ? cust.company_name : '-'}</td>` : ''}
            <td>
              <span style="display:inline-flex;align-items:center;gap:5px">
                ${evtIcons[evt.event_type] || '📌'}
                <span style="font-size:13px">${evt.event_type}</span>
              </span>
            </td>
            <td style="font-size:13px">${evt.message || '-'}</td>
            <td>
              <span class="badge" style="
                background:${severityColor[evt.severity] || '#94a3b8'}20;
                color:${severityColor[evt.severity] || '#94a3b8'};
              ">
                ${severityLabel[evt.severity] || evt.severity}
              </span>
            </td>
            <td style="font-size:12px;color:#64748b;white-space:nowrap">${Utils.timeAgo(evt.updated_at || evt.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
