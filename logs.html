<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#223652">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>제어 로그 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <div class="table-section has-mobile-list" style="margin-bottom:24px">
          <div class="table-header">
            <h2>📜 제어 로그</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 새로고침</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>제어기명</th>
                  <th id="th-customer">고객사</th>
                  <th>명령</th>
                  <th>실행자</th>
                  <th>결과</th>
                  <th>비고</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody id="log-tbody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="log-mobile-list" class="mobile-record-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    let session, allControllers = [], allCustomers = [];

    const cmdIcons = {
      HEATER_ON: '🔥', HEATER_OFF: '❄️',
      AUTO_MODE: '⚙️', MANUAL_MODE: '🖱️',
      REBOOT: '🔄', THRESHOLD_CHANGE: '🎯'
    };

    const cmdLabels = {
      HEATER_ON: '히터 ON', HEATER_OFF: '히터 OFF',
      AUTO_MODE: '자동 모드', MANUAL_MODE: '수동 모드',
      REBOOT: '재부팅', THRESHOLD_CHANGE: '임계값 변경'
    };

    async function init() {
      session = Auth.requireAuth();
      if (!session) return;

      document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'logs');
      document.getElementById('header-placeholder').innerHTML = renderHeader('제어 로그', '', []);
      startClock();

      if (session.role !== 'admin') {
        document.getElementById('th-customer').style.display = 'none';
      }

      await loadAll();
    }

    async function loadAll() {
      [allControllers, allCustomers] = await Promise.all([
        API.getControllers(session),
        API.getCustomers()
      ]);

      const ctrlMap = {};
      allControllers.forEach(c => ctrlMap[c.id] = c);
      const custMap = {};
      allCustomers.forEach(c => custMap[c.id] = c);

      await renderLogs(ctrlMap, custMap);
    }

    function renderLogsMobile(logs, ctrlMap, custMap, isAdmin) {
      const container = document.getElementById('log-mobile-list');
      if (!container) return;
      if (!logs.length) {
        container.innerHTML = `<div class="mobile-record-card"><div class="mobile-record-card__title">제어 로그 없음</div><div class="mobile-record-card__sub">최근 제어 로그가 없습니다.</div></div>`;
        return;
      }
      container.innerHTML = logs.map(log => {
        const ctrl = ctrlMap[log.controller_id];
        const cust = ctrl ? custMap[ctrl.customer_id] : null;
        return `
          <div class="mobile-record-card" onclick="location.href='detail.html?id=${log.controller_id}'">
            <div class="mobile-record-card__top">
              <div>
                <div class="mobile-record-card__title">${cmdIcons[log.command_type] || '📌'} ${cmdLabels[log.command_type] || log.command_type}</div>
                <div class="mobile-record-card__sub">${ctrl ? ctrl.controller_name : log.controller_id}${isAdmin && cust ? ` · ${cust.company_name}` : ''}</div>
              </div>
              <span class="badge ${log.result === 'success' ? 'badge-online' : 'badge-danger'}">${log.result === 'success' ? '성공' : '실패'}</span>
            </div>
            <div class="mobile-record-grid">
              <div class="mobile-record-item"><div class="label">실행자</div><div class="value">${log.user_name || '-'}</div></div>
              <div class="mobile-record-item"><div class="label">시간</div><div class="value">${Utils.timeAgo(log.updated_at || log.created_at)}</div></div>
            </div>
            <div class="mobile-record-card__sub" style="margin-top:12px">${log.note || '-'}</div>
          </div>
        `;
      }).join('');
    }

    async function renderLogs(ctrlMap, custMap) {
      const logs = await API.getControlLogs(null, 50);
      const tbody = document.getElementById('log-tbody');
      const isAdmin = session.role === 'admin';

      const filtered = isAdmin
        ? logs
        : logs.filter(l => {
          const c = ctrlMap[l.controller_id];
          return c && c.customer_id === session.customerId;
        });

      renderLogsMobile(filtered, ctrlMap, custMap, isAdmin);

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdmin ? 7 : 6}" style="text-align:center;padding:30px;color:#64748b">제어 로그 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(log => {
        const ctrl = ctrlMap[log.controller_id];
        const cust = ctrl ? custMap[ctrl.customer_id] : null;
        return `
          <tr onclick="location.href='detail.html?id=${log.controller_id}'" style="cursor:pointer">
            <td>
              <div style="font-weight:600">${ctrl ? ctrl.controller_name : log.controller_id}</div>
            </td>
            ${isAdmin ? `<td style="font-size:13px;color:#94a3b8">${cust ? cust.company_name : '-'}</td>` : ''}
            <td>
              <span style="display:inline-flex;align-items:center;gap:5px;font-weight:600">
                ${cmdIcons[log.command_type] || '📌'}
                ${cmdLabels[log.command_type] || log.command_type}
              </span>
              ${log.command_value && log.command_type === 'THRESHOLD_CHANGE'
                ? `<span style="font-size:12px;color:#94a3b8"> → ${(parseFloat(log.command_value)*100).toFixed(0)}%</span>`
                : ''}
            </td>
            <td style="font-size:13px">👤 ${log.user_name || '-'}</td>
            <td>
              <span class="badge ${log.result === 'success' ? 'badge-online' : 'badge-danger'}">
                ${log.result === 'success' ? '✅ 성공' : '❌ 실패'}
              </span>
            </td>
            <td style="font-size:12px;color:#94a3b8">${log.note || '-'}</td>
            <td style="font-size:12px;color:#64748b;white-space:nowrap">${Utils.timeAgo(log.updated_at || log.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
