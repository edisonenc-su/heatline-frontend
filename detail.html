<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#223652">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>장비 상세 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-layout-balanced {
      display: grid;
      gap: 18px;
    }

    .detail-row {
      display: grid;
      gap: 18px;
      align-items: stretch;
    }

    .detail-row-top {
      grid-template-columns: 1fr;
    }

    .equal-card {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .equal-card .detail-card-body {
      flex: 1;
      min-height: 0;
    }

    .video-section.equal-card .detail-card-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .video-section.equal-card .camera-box {
      flex: 1;
      min-height: 360px;
    }

    .remote-control-card .detail-card-body {
      display: flex;
      flex-direction: column;
    }

    .remote-control-card .control-grid {
      flex: 1;
      display: grid;
      gap: 16px;
    }

    .remote-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .remote-card-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .remote-header-side {
      margin-left: auto;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }

    .remote-clock-slot,
    .remote-subtitle-slot {
      width: 100%;
      min-height: 18px;
      display: flex;
      justify-content: flex-end;
    }

    .title-group > #controllerSubtitle,
    .video-tip,
    .badge-row,
    .helper-text,
    .top-header #header-clock {
      display: none !important;
    }

    .remote-clock-slot #header-clock {
      display: inline-flex !important;
      font-size: 12px !important;
      color: #dbe7ff !important;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      padding: 6px 10px;
      min-height: 18px;
      align-items: center;
      justify-content: center;
    }

    .remote-subtitle-slot #controllerSubtitle {
      display: block !important;
      margin: 0;
      width: 100%;
      font-size: 12px;
      color: #dbe7ff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: right;
      box-sizing: border-box;
    }

    @media (max-width: 980px) {
      .video-section.equal-card .camera-box {
        min-height: 280px;
      }

      .remote-card-header {
        flex-direction: column;
        align-items: stretch;
      }

      .remote-header-side {
        margin-left: 0;
        min-width: 0;
      }

      .remote-clock-slot,
      .remote-subtitle-slot {
        justify-content: flex-start;
      }

      .remote-subtitle-slot #controllerSubtitle {
        text-align: left;
      }
    }

    @media (max-width: 768px) {
      .detail-topbar {
        align-items: flex-start;
      }

      .video-section.equal-card .camera-box {
        min-height: 220px;
      }

      .control-row .btn {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <div class="detail-page">
          <div class="detail-shell">
            <div class="detail-topbar">
              <div class="title-group">
                <h1 id="controllerTitle">장비 상세</h1>
                <p id="controllerSubtitle">컨트롤러 정보를 불러오는 중입니다.</p>
              </div>
            </div>

            <div class="detail-layout-balanced">
              <div class="detail-row detail-row-top">
                <section class="detail-card video-section equal-card">
                  <div class="detail-card-header">
                    <h2>🎥 실시간 영상</h2>
                    <span class="video-tip">HTTPS camera_url 권장</span>
                  </div>
                  <div class="detail-card-body">
                    <div class="badge-row">
                      <span id="badgeStatus" class="badge status-offline">상태 -</span>
                      <span id="badgeSnow" class="badge snow-off">눈 감지 -</span>
                      <span id="badgeHeater" class="badge heater-off">열선 -</span>
                    </div>

                    <div class="camera-box">
                      <img id="cameraStream" alt="실시간 영상" style="display:none;" />
                      <div id="cameraEmpty" class="camera-empty">카메라 스트림이 등록되지 않았습니다.</div>
                    </div>

                    <div class="helper-text">
                      영상은 컨트롤러의 <code>camera_url</code> 값을 사용합니다. 외부 접속 환경에서는 HTTPS 스트림 주소를 사용하는 구성이 권장됩니다.
                    </div>
                  </div>
                </section>

                <section class="detail-card equal-card remote-control-card" id="remoteControlCard">
                  <div class="detail-card-header remote-card-header">
                    <div class="remote-card-title">
                      <h2>🎛️ 원격 제어</h2>
                      <span class="detail-card-meta">권한 있는 계정만 제어 가능</span>
                    </div>
                    <div class="remote-header-side">
                      <div id="remoteClockSlot" class="remote-clock-slot"></div>
                      <div id="remoteSubtitleSlot" class="remote-subtitle-slot"></div>
                    </div>
                  </div>
                  <div class="detail-card-body">
                    <div class="control-grid">
                      <div class="control-block">
                        <h3>열선 제어</h3>
                        <div class="control-row">
                          <button class="btn btn-danger" id="btnHeatOn">열선 끄기</button>
                          <button class="btn btn-success" id="btnHeatOff">열선 켜기</button>
                        </div>
                        <div class="footer-note">
                          직접 열선 ON/OFF 명령은 수동 모드에서 사용하는 것을 권장합니다.
                          다만 제어 자체를 강제 차단하지는 않습니다.
                        </div>
                      </div>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script type="module">
      import {
        getDetailPageData,
        buildDetailCommands,
        buildNoCacheStreamUrl,
        formatDateTime,
        canControlController
      } from "./js/api.js";

      const qs = new URLSearchParams(window.location.search);
      const controllerId = Number(qs.get("id"));

      let detailTimer = null;
      let lastCameraUrl = null;
      let currentController = null;

      function $(id) {
        return document.getElementById(id);
      }

      function setText(id, value) {
        const el = $(id);
        if (el) el.textContent = value;
      }

      function moveHeaderExtras() {
        const clock = $("header-clock");
        const clockSlot = $("remoteClockSlot");
        const subtitle = $("controllerSubtitle");
        const subtitleSlot = $("remoteSubtitleSlot");

        if (clock && clockSlot && clock.parentElement !== clockSlot) {
          clockSlot.appendChild(clock);
        }

        if (subtitle && subtitleSlot && subtitle.parentElement !== subtitleSlot) {
          subtitleSlot.appendChild(subtitle);
        }
      }

      const commands = buildDetailCommands(controllerId);

      function setBadgeStatus(status) {
        const el = $("badgeStatus");
        if (!el) return;
        el.className = "badge";

        if (status === "online") {
          el.classList.add("status-online");
          el.textContent = "상태 온라인";
        } else if (status === "warning") {
          el.classList.add("status-warning");
          el.textContent = "상태 경고";
        } else if (status === "error") {
          el.classList.add("status-error");
          el.textContent = "상태 오류";
        } else {
          el.classList.add("status-offline");
          el.textContent = "상태 오프라인";
        }
      }

      function setBadgeSnow(detected) {
        const el = $("badgeSnow");
        if (!el) return;
        el.className = "badge";

        if (detected) {
          el.classList.add("snow-on");
          el.textContent = "눈 감지 감지됨";
        } else {
          el.classList.add("snow-off");
          el.textContent = "눈 감지 없음";
        }
      }

      function setBadgeHeater(on) {
        const el = $("badgeHeater");
        if (!el) return;
        el.className = "badge";

        if (on) {
          el.classList.add("heater-on");
          el.textContent = "열선 OFF";
        } else {
          el.classList.add("heater-off");
          el.textContent = "열선 ON";
        }
      }

      function renderCamera(cameraUrl) {
        const img = $("cameraStream");
        const empty = $("cameraEmpty");
        if (!img || !empty) return;

        if (!cameraUrl) {
          img.style.display = "none";
          img.removeAttribute("src");
          empty.style.display = "block";
          lastCameraUrl = null;
          return;
        }

        if (lastCameraUrl !== cameraUrl) {
          img.src = buildNoCacheStreamUrl(cameraUrl);
          img.style.display = "block";
          empty.style.display = "none";
          lastCameraUrl = cameraUrl;
        }
      }

      function setControlPermission(controller) {
        const allowed = canControlController(controller);
        ["btnHeatOn", "btnHeatOff"].forEach(id => {
          const el = $(id);
          if (el) el.disabled = !allowed;
        });

        if (!allowed) {
          setText("controllerSubtitle", `${controller.install_location || "-"} · 조회만 가능 (제어 권한 없음)`);
        }
      }

      function renderController(c) {
        currentController = c;

        document.title = `${c.controller_name || "장비 상세"} | Heatline`;
        setText("controllerTitle", c.controller_name || `컨트롤러 #${c.id}`);
        setText("controllerSubtitle", `${c.install_location || "-"} · 마지막 통신 ${formatDateTime(c.last_seen_at)}`);

        setBadgeStatus(c.status);
        setBadgeSnow(!!c.snow_detected);
        setBadgeHeater(!!c.heater_on);
        renderCamera(c.camera_url);
        setControlPermission(c);
        moveHeaderExtras();
      }

      async function fetchAll() {
        if (!controllerId || Number.isNaN(controllerId)) {
          alert("잘못된 접근입니다. detail.html?id={ID} 형식으로 접속하세요.");
          return;
        }

        try {
          const { controller } = await getDetailPageData(controllerId, {
            eventLimit: 5,
            controlLogLimit: 5
          });
          renderController(controller);
        } catch (err) {
          console.error("detail fetch error:", err);
          alert(err.message);
        }
      }

      async function guardedAction(question, fn) {
        if (!currentController || !canControlController(currentController)) {
          alert("이 장비에 대한 제어 권한이 없습니다.");
          return;
        }

        if (!confirm(question)) return;

        try {
          await fn();
          await fetchAll();
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      }

      function startPolling() {
        fetchAll();
        detailTimer = setInterval(fetchAll, 2000);
      }

      function stopPolling() {
        if (detailTimer) clearInterval(detailTimer);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const btnHeatOn = $("btnHeatOn");
        const btnHeatOff = $("btnHeatOff");

        if (btnHeatOn) {
          btnHeatOn.addEventListener("click", () =>
            guardedAction("열선을 켭니다. 계속하시겠습니까?", () => commands.heatOn())
          );
        }

        if (btnHeatOff) {
          btnHeatOff.addEventListener("click", () =>
            guardedAction("열선을 끕니다. 계속하시겠습니까?", () => commands.heatOff())
          );
        }

        moveHeaderExtras();
        startPolling();
      });

      window.addEventListener("beforeunload", stopPolling);

      const session = window.Auth.requireAuth();
      if (session) {
        document.getElementById("sidebar-placeholder").innerHTML =
          window.renderSidebar(session, "controllers");
        document.getElementById("header-placeholder").innerHTML =
          window.renderHeader("장비 상세", "실시간 상태 및 원격 제어", []);
        window.startClock();
        moveHeaderExtras();
      }
    </script>
  </div>

</body>
</html>
