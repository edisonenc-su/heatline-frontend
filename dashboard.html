<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- manifest.webmanifest 응답이 비정상일 때 콘솔 오류를 줄이기 위해 대시보드에서는 임시 비활성화 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>대시보드 - 도로 열선 통합관제 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css?v=20260406-2">
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <div class="main-content">
      <div id="header-placeholder"></div>

      <div class="page-body">
        <!-- 이벤트 알림 배너 -->
        <div id="alert-banner" class="hidden" style="
          background: rgba(239,68,68,0.1);
          border: 1px solid rgba(239,68,68,0.3);
          border-radius: 12px;
          padding: 12px 20px;
          margin-bottom: 20px;
          display: flex;
          align-items: center;
          gap: 12px;
          font-size: 14px;
        ">
          <span style="font-size:20px">🚨</span>
          <div id="alert-text" style="flex:1"></div>
          <button onclick="document.getElementById('alert-banner').classList.add('hidden')" 
                  style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px">✕</button>
        </div>

        <!-- 지도 -->
        <div class="map-section">
          <div class="map-header">
            <h2>🗺️ 전국 제어기 설치 현황</h2>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
              <div style="display:flex;gap:8px;align-items:center;font-size:13px">
                <div style="width:12px;height:12px;border-radius:50%;background:#10b981"></div> 온라인
                <div style="width:12px;height:12px;border-radius:50%;background:#f59e0b;margin-left:6px"></div> 경고
                <div style="width:12px;height:12px;border-radius:50%;background:#64748b;margin-left:6px"></div> 오프라인
                <div style="width:12px;height:12px;border-radius:50%;background:#ef4444;margin-left:6px"></div> 오류
              </div>
              <button class="btn btn-secondary btn-sm" onclick="resetMapView()">
                🔄 전체 보기
              </button>
            </div>
          </div>
          <div id="map"></div>
        </div>

        <!-- 제어기 빠른 현황 (최근 이상 장비 / 히터 작동 장비) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px" id="quick-sections">
          <!-- 이상/경고 장비 -->
          <div class="table-section">
            <div class="table-header">
              <h2>⚠️ 주의 장비</h2>
              <a href="controllers.html" style="font-size:13px;color:#00aeff">전체 보기 →</a>
            </div>
            <div id="warning-list" style="padding:0 0 8px">
              <div style="padding:20px;text-align:center;color:#64748b;font-size:14px">로딩 중...</div>
            </div>
          </div>

          <!-- 최근 이벤트 -->
          <div class="table-section">
            <div class="table-header">
              <h2>🔔 최근 이벤트</h2>
              <a href="events.html" style="font-size:13px;color:#00aeff">전체 보기 →</a>
            </div>
            <div id="event-list" class="log-list" style="padding:0 16px">
              <div style="padding:20px;text-align:center;color:#64748b;font-size:14px">로딩 중...</div>
            </div>
          </div>
        </div>

        <!-- AS 만료 임박 장비 -->
        <div class="table-section" id="as-section">
          <div class="table-header">
            <h2>📅 AS 만료 임박 장비</h2>
            <span style="font-size:13px;color:#94a3b8">90일 이내 만료 장비</span>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>제어기명</th>
                  <th id="th-customer">고객사</th>
                  <th>설치일</th>
                  <th>AS 만료일</th>
                  <th>잔여 기간</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="as-table-body">
                <tr><td colspan="6" style="text-align:center;padding:20px;color:#64748b">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 토스트 / 모달 -->
  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title confirm-title">확인</div>
        <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
      </div>
      <div class="modal-body confirm-modal">
        <span class="icon">❓</span>
        <p class="confirm-msg"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">취소</button>
        <button class="btn btn-danger" id="confirm-ok-btn">확인</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js?v=20260406-2"></script>
  <script>
    const BUILD_VERSION = '20260406-2';
    let session = null;
    let map = null;
    let allControllers = [];
    let allCustomers = [];
    let mapMarkers = [];

    function setSectionMessage(targetId, html) {
      const el = document.getElementById(targetId);
      if (el) el.innerHTML = html;
    }

    function showDashboardError(message) {
      const safeMessage = escapeHtml(message || '대시보드 데이터를 불러오지 못했습니다.');
      setSectionMessage('warning-list', `<div style="padding:20px;text-align:center;color:#ef4444;font-size:14px">${safeMessage}</div>`);
      setSectionMessage('event-list', `<div style="padding:20px;text-align:center;color:#ef4444;font-size:14px">${safeMessage}</div>`);

      const tbody = document.getElementById('as-table-body');
      if (tbody) {
        const colspan = session && session.role === 'admin' ? 6 : 5;
        tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center;padding:20px;color:#ef4444">${safeMessage}</td></tr>`;
      }

      const banner = document.getElementById('alert-banner');
      const text = document.getElementById('alert-text');
      if (banner && text) {
        banner.classList.remove('hidden');
        text.innerHTML = `<strong>대시보드 오류:</strong> ${safeMessage}`;
      }
    }

    function handleDashboardError(error, context = '대시보드 데이터를 불러오지 못했습니다.') {
      const rawMessage = error && error.message ? error.message : String(error || context);
      console.error(`[dashboard ${BUILD_VERSION}] ${context}`, error);

      if (/INVALID_TOKEN|UNAUTHORIZED|유효하지 않은 토큰|인증 토큰이 필요합니다/i.test(rawMessage)) {
        showDashboardError('세션이 만료되었습니다. 다시 로그인해 주세요.');
        setTimeout(() => Auth.logout(), 1200);
        return;
      }

      showDashboardError(`${context} (${rawMessage})`);
    }

    function renderDashboardSummary() {
      const stats = Utils.calcStats(allControllers);

      document.getElementById('header-placeholder').innerHTML = renderHeader(
        session.role === 'admin' ? '전국 지도 관제' : '장비 지도',
        session.role === 'admin' ? `전체 ${allControllers.length}개 제어기` : `${allControllers.length}개 보유`,
        [
          { type: 'online', label: '온라인', value: stats.online },
          { type: 'warning', label: '경고', value: stats.warning },
          { type: 'danger', label: '오프라인', value: stats.offline }
        ]
      );

      const statsContainer = document.getElementById('stats-container');
      if (statsContainer) {
        statsContainer.innerHTML = renderStatsCards(stats, session);
      }
    }

    async function init() {
      try {
        session = Auth.requireAuth();
        if (!session) return;

        document.getElementById('sidebar-placeholder').innerHTML = renderSidebar(session, 'dashboard');

        await loadData();
        renderDashboardSummary();
        startClock();

        if (session.role !== 'admin') {
          const th = document.getElementById('th-customer');
          if (th) th.style.display = 'none';
        }

        renderAlertBanner();

        map = initMap('map');
        renderMapMarkers();
        renderWarningList();
        await renderEventList();
        renderAsTable();

        setInterval(async () => {
          try {
            await loadData();
            renderDashboardSummary();
            renderAlertBanner();
            renderMapMarkers(true);
            renderWarningList();
            await renderEventList();
            renderAsTable();
          } catch (error) {
            handleDashboardError(error, '대시보드 자동 새로고침에 실패했습니다.');
          }
        }, 30000);
      } catch (error) {
        handleDashboardError(error, '대시보드 초기화에 실패했습니다.');
      }
    }

    async function loadData() {
      [allControllers, allCustomers] = await Promise.all([
        API.getControllers(session),
        API.getCustomers()
      ]);
    }

    function renderAlertBanner() {
      const critical = allControllers.filter(c => c.status === 'offline' || c.status === 'error');
      const asUrgent = allControllers.filter(c => {
        const d = Utils.calcAsRemaining(c.as_expire_at);
        return d !== null && d <= 14;
      });

      const banner = document.getElementById('alert-banner');
      const text = document.getElementById('alert-text');
      if (!banner || !text) return;

      const msgs = [];
      if (critical.length > 0) msgs.push(`오프라인/오류 ${critical.length}대`);
      if (asUrgent.length > 0) msgs.push(`AS 만료 14일 이내 ${asUrgent.length}대`);

      if (msgs.length > 0) {
        banner.classList.remove('hidden');
        text.innerHTML = `<strong>긴급 확인 필요:</strong> ${msgs.join(', ')} - 즉시 조치하세요.`;
      } else {
        banner.classList.add('hidden');
        text.innerHTML = '';
      }
    }

    function renderMapMarkers(update = false) {
      // 기존 마커 제거
      mapMarkers.forEach(m => m.remove());
      mapMarkers = [];

      allControllers.forEach(ctrl => {
        const marker = createControllerMarker(map, ctrl, (id) => {
          location.href = 'detail.html?id=' + id;
        });
        if (marker) mapMarkers.push(marker);
      });

      // 마커가 있으면 범위에 맞춰 지도 조정
      if (!update && mapMarkers.length > 0) {
        const coords = allControllers
          .filter(c => c.latitude && c.longitude)
          .map(c => [c.latitude, c.longitude]);
        if (coords.length > 0) {
          try {
            map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
          } catch (e) {
            map.setView([36.5, 127.8], 7);
          }
        }
      }
    }

    function resetMapView() {
      const coords = allControllers
        .filter(c => c.latitude && c.longitude)
        .map(c => [c.latitude, c.longitude]);
      if (coords.length > 0) {
        map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
      } else {
        map.setView([36.5, 127.8], 7);
      }
    }

    function renderWarningList() {
      const warnings = allControllers.filter(c =>
        c.status === 'offline' || c.status === 'warning' || c.status === 'error'
      );

      const container = document.getElementById('warning-list');

      if (warnings.length === 0) {
        container.innerHTML = `
          <div style="padding:24px;text-align:center;color:#10b981;font-size:14px">
            ✅ 이상 장비 없음
          </div>`;
        return;
      }

      container.innerHTML = warnings.slice(0, 5).map(ctrl => {
        const customer = allCustomers.find(c => c.id === ctrl.customer_id);
        return `
          <div onclick="location.href='detail.html?id=${ctrl.id}'" style="
            padding:14px 20px;
            border-bottom:1px solid var(--border);
            cursor:pointer;
            transition:background 0.15s;
          " onmouseover="this.style.background='rgba(255,255,255,0.03)'"
             onmouseout="this.style.background='transparent'">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-weight:600;font-size:14px">${ctrl.controller_name}</span>
              ${Utils.getStatusBadge(ctrl.status)}
            </div>
            <div style="font-size:12px;color:#94a3b8">
              ${customer ? customer.company_name + ' · ' : ''}${ctrl.install_location || ctrl.install_address || '-'}
            </div>
            <div style="font-size:12px;color:#64748b;margin-top:2px">
              마지막 접속: ${Utils.timeAgo(ctrl.last_seen_at)}
            </div>
          </div>
        `;
      }).join('');

      if (warnings.length > 5) {
        container.innerHTML += `
          <div style="padding:12px 20px;text-align:center;font-size:13px;color:#64748b">
            외 ${warnings.length - 5}개 더 있음 · <a href="controllers.html" style="color:#00aeff">전체 보기</a>
          </div>
        `;
      }
    }

    async function renderEventList() {
      const events = await API.getEventLogs(null, 8);
      const container = document.getElementById('event-list');

      if (events.length === 0) {
        container.innerHTML = `<div style="padding:20px;text-align:center;color:#64748b;font-size:14px">이벤트 없음</div>`;
        return;
      }

      const evtIcons = {
        SNOW_DETECTED: '❄️',
        SNOW_CLEARED: '☀️',
        HEATER_ON: '🔥',
        HEATER_OFF: '💧',
        DEVICE_OFFLINE: '⚫',
        DEVICE_ONLINE: '🟢',
        ALARM: '🚨'
      };

      const ctrl_map = {};
      allControllers.forEach(c => ctrl_map[c.id] = c);

      container.innerHTML = events.map(evt => {
        const ctrl = ctrl_map[evt.controller_id];
        const icon = evtIcons[evt.event_type] || '📌';
        const colorMap = { info: '#10b981', warning: '#f59e0b', critical: '#ef4444' };
        return `
          <div class="log-item" onclick="location.href='detail.html?id=${evt.controller_id}'" style="cursor:pointer">
            <div class="log-icon">${icon}</div>
            <div class="log-content">
              <div class="log-msg">${evt.message || evt.event_type}</div>
              <div class="log-meta">
                ${ctrl ? ctrl.controller_name + ' · ' : ''}
                <span style="color:${colorMap[evt.severity] || '#94a3b8'}">${evt.severity || 'info'}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAsTable() {
      const urgent = allControllers
        .filter(c => {
          const d = Utils.calcAsRemaining(c.as_expire_at);
          return d !== null && d <= 90;
        })
        .sort((a, b) => Utils.calcAsRemaining(a.as_expire_at) - Utils.calcAsRemaining(b.as_expire_at));

      const tbody = document.getElementById('as-table-body');
      const isAdmin = session.role === 'admin';

      if (urgent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdmin ? 6 : 5}" style="text-align:center;padding:24px;color:#10b981">✅ AS 만료 임박 장비 없음</td></tr>`;
        return;
      }

      tbody.innerHTML = urgent.map(ctrl => {
        const customer = allCustomers.find(c => c.id === ctrl.customer_id);
        const days = Utils.calcAsRemaining(ctrl.as_expire_at);
        const asStatus = Utils.getAsStatus(days);
        const asColor = asStatus === 'good' ? '#10b981' : asStatus === 'caution' ? '#f59e0b' : '#ef4444';
        const asText = days < 0 ? `만료 ${Math.abs(days)}일 경과` : `${days}일 잔여`;

        return `
          <tr onclick="location.href='detail.html?id=${ctrl.id}'" style="cursor:pointer">
            <td>
              <div style="font-weight:600">${ctrl.controller_name}</div>
              <div style="font-size:12px;color:#94a3b8">${ctrl.serial_no || ''}</div>
            </td>
            ${isAdmin ? `<td style="font-size:13px">${customer ? customer.company_name : '-'}</td>` : ''}
            <td style="font-size:13px;color:#94a3b8">${Utils.formatDate(ctrl.installed_at)}</td>
            <td style="font-size:13px">${Utils.formatDate(ctrl.as_expire_at)}</td>
            <td>
              <span class="as-badge ${asStatus === 'expired' ? 'urgent' : asStatus}" style="color:${asColor}">
                ${asStatus === 'urgent' || asStatus === 'expired' ? '🚨' : '⚠️'} ${asText}
              </span>
            </td>
            <td>${Utils.getStatusBadge(ctrl.status)}</td>
          </tr>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
